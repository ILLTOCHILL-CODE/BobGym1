<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        /* Anti-FOUC (Flash of Unstyled Content) */
        html {
            background-color: #050505;
            color: #fff;
        }

        body {
            opacity: 0;
            visibility: hidden;
        }
    </style>
    <title>APEX | Membership Portal</title>
    <style>
        .step {
            display: none;
        }

        .step.active {
            display: block;
        }

        input {
            width: 100%;
            padding: 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-family: inherit;
            margin-bottom: 1rem;
            border-radius: 4px;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(204, 255, 0, 0.2);
        }
    </style>
  <script type="module" crossorigin src="/assets/main-CeP03lpp.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/main-nugfN-zR.css">
</head>

<body style="padding-top: 100px;">
    <!-- Glass Nav -->
    <nav class="glass-nav">
        <a href="/"
            style="font-family: var(--font-heading); font-size: 2rem; font-weight: 900; letter-spacing: 2px;">APEX</a>
        <div class="nav-links">
            <a href="/pages/classes.html">Classes</a>
            <a href="/pages/trainers.html">Trainers</a>
            <a href="/pages/membership.html" class="text-accent">Membership</a>
        </div>
    </nav>

    <div class="container" style="min-height: 80vh; padding-top: 4rem; max-width: 600px;">
        <h1 style="font-size: 4rem; text-align: center;">YOUR FREE PASS.</h1>
        <p class="text-secondary" style="text-align: center; margin-bottom: 3rem;">We just need three details from you
            to activate your unlimited trial session. No credit card required.</p>

        <form id="signup-flow"
            style="background: var(--background); border: 1px solid var(--border); padding: 3rem; border-radius: 4px; position: relative;"
            onsubmit="event.preventDefault(); alert('Lead Captured Successfully!');">

            <div class="step active fade-in" id="step-1">
                <h3 style="margin-bottom: 1.5rem;">What's your name?</h3>
                <input type="text" placeholder="First & Last Name" required />
                <button type="button" class="btn-primary" onclick="nextStep(1)">Continue</button>
            </div>

            <div class="step fade-in" id="step-2">
                <h3 style="margin-bottom: 1.5rem;">Where should we send the pass?</h3>
                <input type="email" placeholder="Email Address" required />
                <button type="button" class="btn-primary" onclick="nextStep(2)">Almost There</button>
            </div>

            <div class="step fade-in" id="step-3">
                <h3 style="margin-bottom: 1.5rem;">What is your primary goal?</h3>
                <input type="text" placeholder="e.g. Strength, Weight Loss, Mobility" required />
                <button type="submit" class="btn-primary" style="background: var(--text-primary); color: #000;">Claim It
                    Now</button>
            </div>

        </form>
    </div>

    <!-- Scripts -->
    <script>
        function nextStep(currentStep) {
            document.getElementById(`step-${currentStep}`).classList.remove('active');
            document.getElementById(`step-${currentStep + 1}`).classList.add('active');
        }
    </script>
</body>

</html>
